		<script type="module">
window.onerror = (message, source, lineno, colno, errorObj) => {
	const errorDetails = errorObj ? JSON.stringify({
		name: errorObj.name,
		message: errorObj.message,
		stack: errorObj.stack,
		source,
		lineno,
		colno,
	}) : null;

	window.parent.postMessage({
		type: 'horizons-runtime-error',
		message,
		error: errorDetails
	}, '*');
};
</script>
		<script type="module">
const observer = new MutationObserver((mutations) => {
	for (const mutation of mutations) {
		for (const addedNode of mutation.addedNodes) {
			if (
				addedNode.nodeType === Node.ELEMENT_NODE &&
				(
					addedNode.tagName?.toLowerCase() === 'vite-error-overlay' ||
					addedNode.classList?.contains('backdrop')
				)
			) {
				handleViteOverlay(addedNode);
			}
		}
	}
});

observer.observe(document.documentElement, {
	childList: true,
	subtree: true
});

function handleViteOverlay(node) {
	if (!node.shadowRoot) {
		return;
	}

	const backdrop = node.shadowRoot.querySelector('.backdrop');

	if (backdrop) {
		const overlayHtml = backdrop.outerHTML;
		const parser = new DOMParser();
		const doc = parser.parseFromString(overlayHtml, 'text/html');
		const messageBodyElement = doc.querySelector('.message-body');
		const fileElement = doc.querySelector('.file');
		const messageText = messageBodyElement ? messageBodyElement.textContent.trim() : '';
		const fileText = fileElement ? fileElement.textContent.trim() : '';
		const error = messageText + (fileText ? ' File:' + fileText : '');

		window.parent.postMessage({
			type: 'horizons-vite-error',
			error,
		}, '*');
	}
}
</script>

const originalConsoleError = console.error;
console.error = function(...args) {
	originalConsoleError.apply(console, args);

	let errorString = '';

	for (let i = 0; i < args.length; i++) {
		const arg = args[i];
		if (arg instanceof Error) {
			errorString = arg.stack || `${arg.name}: ${arg.message}`;
			break;
		}
	}

	if (!errorString) {
		errorString = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
	}

	window.parent.postMessage({
		type: 'horizons-console-error',
		error: errorString
	}, '*');
};
</script>

const originalFetch = window.fetch;

window.fetch = function(...args) {
	const url = args[0] instanceof Request ? args[0].url : args[0];

	// Skip WebSocket URLs
	if (url.startsWith('ws:') || url.startsWith('wss:')) {
		return originalFetch.apply(this, args);
	}

	return originalFetch.apply(this, args)
		.then(async response => {
			const contentType = response.headers.get('Content-Type') || '';

			// Exclude HTML document responses
			const isDocumentResponse =
				contentType.includes('text/html') ||
				contentType.includes('application/xhtml+xml');

			if (!response.ok && !isDocumentResponse) {
					const responseClone = response.clone();
					const errorFromRes = await responseClone.text();
					const requestUrl = response.url;
					console.error(`Fetch error from ${requestUrl}: ${errorFromRes}`);
			}

			return response;
		})
		.catch(error => {
			if (!url.match(/.html?$/i)) {
				console.error(error);
			}

			throw error;
		});
};
</script>
		<script type="module">
if (window.self !== window.top) {
	const notifyNavigationError = (url, source) => {
		window.parent.postMessage({
			type: 'horizons-navigation-error',
			url,
			source,
		}, '*');
	};

	const isCrossOriginHttpNavigation = (url) => {
		try {
			const destinationUrl = new URL(url, window.location.href);

			if (!['http:', 'https:'].includes(destinationUrl.protocol)) {
				return false;
			}

			return destinationUrl.origin !== window.location.origin;
		} catch {
			return false;
		}
	};

	document.addEventListener('click', (event) => {
		const link = event.target?.closest?.('a[href]');
		if (!link) return;

		const href = link.getAttribute('href');
		if (!href || href.startsWith('#')) return;

		if (link.hasAttribute('download')) return;
		if (link.target && link.target.toLowerCase() === '_blank') return;

		if (!isCrossOriginHttpNavigation(href)) return;

		event.preventDefault();
		notifyNavigationError(href, 'anchor-click');

		try {
			window.open(href, '_blank', 'noopener,noreferrer');
		} catch {}
	}, true);

	document.addEventListener('submit', (event) => {
		const form = event.target;
		if (!(form instanceof HTMLFormElement)) return;

		const action = form.getAttribute('action') || window.location.href;
		if (!isCrossOriginHttpNavigation(action)) return;

		event.preventDefault();
		notifyNavigationError(action, 'form-submit');
	}, true);

	if (window.navigation) {
		window.navigation.addEventListener('navigate', (event) => {
			const url = event.destination.url;

			if (!isCrossOriginHttpNavigation(url)) {
				return;
			}

			if (event.cancelable) {
				event.preventDefault();
			}

			notifyNavigationError(url, 'navigation-api');
		});
	}
}
